<!DOCTYPE html>

<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Connect4 — Cyberpunk</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>


<div class="bg-grid"></div>

<div class="scanlines"></div>


<div class="container">


    <header>

        <div class="title-glow">

            <h1>CONNECT<span class="accent">4</span></h1>

            <div class="subtitle">NEURAL GAME SYSTEM</div>

        </div>

    </header>


    <div class="panel controls-panel">

        <div class="controls-grid">


            <div class="control-group">

                <label class="ctrl-label">MODE</label>

                <select id="mode" class="cyber-select">

                    <option value="">— SELECT —</option>

                    <option value="2players">2 JOUEURS</option>

                    <option value="human_vs_ai">HUMAIN vs IA</option>

                    <option value="ai_vs_ai">IA vs IA</option>

                </select>

            </div>


            <div class="control-group">

                <label class="ctrl-label">IA TYPE</label>

                <select id="ai_type" class="cyber-select">

                    <option value="random">RANDOM</option>

                    <option value="minimax">MINIMAX</option>

                    <option value="bdd">IA BASE DE DONNÉES</option>

                </select>

            </div>


            <div class="control-group">

                <label class="ctrl-label">PREMIER</label>

                <select id="starting" class="cyber-select">

                    <option value="1">⬤ ROUGE</option>

                    <option value="2">⬤ JAUNE</option>

                </select>

            </div>


            <div class="control-group" id="depth-group">

                <label class="ctrl-label">PROFONDEUR</label>

                <input type="number" id="depth" value="3" min="1" max="6" class="cyber-input">

            </div>


        </div>


        <div class="buttons-row">

            <button onclick="startGame()" class="btn btn-primary">▶ START</button>

            <button onclick="undo()" class="btn btn-secondary">↩ UNDO</button>

            <button onclick="restart()" class="btn btn-secondary">↺ RESTART</button>

            <button onclick="aiSuggestion()" class="btn btn-accent">⚡ IA HINT</button>

            <button onclick="saveGame()" class="btn btn-secondary">💾 SAVE</button>

            <button onclick="pauseGame()" class="btn btn-secondary">⏸ PAUSE</button>

            <button onclick="resumeGame()" class="btn btn-secondary">▶ RESUME</button>

            <a href="/historique" class="btn btn-secondary">📋 HISTORIQUE</a>

        </div>

    </div>


    <div class="status-bar">

        <div class="status-dot"></div>

        <p id="info">INITIALISATION DU SYSTÈME...</p>

    </div>


    <div class="game-area">

        <div class="board-wrapper">

            <div id="board"></div>

            <div id="scoresRow"></div>

        </div>

    </div>


</div>


<script>

    const ROWS = {{ rows }};

    const COLS = {{ cols }};

    const INITIAL_GRID = {{ grid | tojson }};

    const RESUMED = {{ resumed | tojson }};

    const RESUMED_MODE = {{ mode | tojson }};

</script>

<script>
document.getElementById('ai_type').addEventListener('change', function() {
    const depthGroup = document.getElementById('depth-group');
    depthGroup.style.display = this.value === 'bdd' ? 'none' : 'flex';
});
</script>

<script src="/static/script.js"></script>


</body>

</html>
