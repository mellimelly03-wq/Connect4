<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 4</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Exo+2:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <!-- ═══ HEADER ═══ -->
    <header>
        <div class="title-glow">
            <h1>CONNECT <span class="accent">4</span></h1>
            <div class="subtitle"></div>
        </div>
    </header>

    <!-- ═══ STATUS BAR sticky ═══ -->
    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <div style="flex:1;">
            <p id="info">👋 Bienvenue ! Choisis un mode et clique sur Démarrer.</p>
            <div id="aiProgress"><div id="aiProgressBar"></div></div>
        </div>
    </div>

    <!-- ═══ PANEL PRINCIPAL ═══ -->
    <div class="panel">

        <!-- Sélecteurs -->
        <div class="controls-grid">

            <div class="control-group">
                <label class="ctrl-label">🎮 Mode de jeu</label>
                <select id="mode" class="cyber-select">
                    <option value="">— Choisir —</option>
                    <option value="2players">👥 2 Joueurs</option>
                    <option value="human_vs_ai">🤖 Humain vs IA</option>
                    <option value="ai_vs_ai">⚡ IA vs IA</option>
                </select>
            </div>

            <div class="control-group">
                <label class="ctrl-label">🧠 Type d'IA</label>
                <select id="ai_type" class="cyber-select">
                    <option value="random">🎲 Aléatoire</option>
                    <option value="minimax">🧠 Minimax</option>
                    <option value="bdd">🗄️ Base de données</option>
                </select>
            </div>

            <div class="control-group">
                <label class="ctrl-label">🔴 Je joue</label>
                <select id="starting" class="cyber-select">
                    <option value="1">🔴 Rouge</option>
                    <option value="2">🟡 Jaune</option>
                </select>
            </div>

            <div class="control-group" id="depth-group">
                <label class="ctrl-label">🔢 Profondeur IA</label>
                <input type="number" id="depth" value="4" min="1" max="8" class="cyber-input">
            </div>

        </div>

        <!-- Bouton principal bien visible -->
        <div style="display:flex; justify-content:center; margin-bottom:14px;">
            <button onclick="startGame()" class="btn btn-primary" style="font-size:1rem; padding:12px 32px; border-radius:12px;">
                ▶ Démarrer la partie
            </button>
        </div>

        <!-- Boutons actions -->
        <div class="buttons-row">
            <button onclick="undo()" class="btn btn-secondary">↩ Annuler</button>
            <button onclick="restart()" class="btn btn-secondary">↺ Rejouer</button>
            <button onclick="aiSuggestion()" class="btn btn-accent">💡 Astuce IA</button>
            <button onclick="analyzeGame()" class="btn btn-accent">🔮 Analyser</button>
            <button onclick="saveGame()" class="btn btn-secondary">💾 Sauvegarder</button>
            <button onclick="pauseGame()" class="btn btn-secondary">⏸ Pause</button>
            <button onclick="resumeGame()" class="btn btn-secondary">▶ Reprendre</button>
            <a href="/historique" class="btn btn-secondary">📋 Historique</a>
        </div>

        <!-- Boutons avancés -->
        <div class="buttons-row" style="margin-top:8px;">
            <button onclick="togglePaintMode()" class="btn btn-secondary" id="paintBtn">🖌 Mode Peinture</button>
            <button onclick="toggleSwitchControls()" class="btn btn-secondary">🔄 switch</button>
        </div>

        <!-- ═══ Contrôles peinture ═══ -->
        <div id="paintControls">
            <span style="font-weight:800; font-size:0.75rem; color:#92400e; letter-spacing:0.1em;">COULEUR :</span>
            <button class="paint-color-btn active-paint-btn" id="paintColor1" onclick="setPaintColor(1)" title="Rouge"></button>
            <button class="paint-color-btn" id="paintColor2" onclick="setPaintColor(2)" title="Jaune"></button>
            <button class="paint-color-btn" id="paintColor0" onclick="setPaintColor(0)" title="Effacer">✕</button>
            <span id="paintNextPlayer" style="color: var(--red);">⬤ Rouge joue</span>

            <div style="width:100%; border-top:1.5px solid #fde68a; margin:6px 0;"></div>

            <span style="font-weight:800; font-size:0.72rem; color:#92400e;">JOUER DEPUIS CE PLATEAU :</span>
            <select id="paintMode" class="cyber-select" style="width:auto;">
                <option value="2players">👥 2 Joueurs</option>
                <option value="human_vs_ai">🤖 Humain vs IA</option>
                <option value="ai_vs_ai">⚡ IA vs IA</option>
            </select>
            <select id="paintAiType" class="cyber-select" style="width:auto;">
                <option value="minimax">🧠 Minimax</option>
                <option value="random">🎲 Aléatoire</option>
                <option value="bdd">🗄️ IA BDD</option>
            </select>
            <select id="paintHumanColor" class="cyber-select" style="width:auto;">
                <option value="rouge">🔴 Je suis Rouge</option>
                <option value="jaune">🟡 Je suis Jaune</option>
            </select>
            <button onclick="startFromPaint()" class="btn btn-primary">▶ Jouer depuis ici</button>
        </div>

        <!-- ═══ Switch contrôle ═══ -->
        <div id="switchControls">
            <span style="font-weight:800; font-size:0.75rem; color:var(--cyan);">CHANGER EN COURS DE PARTIE :</span>

            <select id="switchMode" class="cyber-select" style="width:auto;" onchange="toggleSwitchAiOptions()">
                <option value="2players">👥 2 Joueurs</option>
                <option value="human_vs_ai">🤖 Humain vs IA</option>
                <option value="ai_vs_ai">⚡ IA vs IA</option>
            </select>

            <select id="switchAiType" class="cyber-select" style="width:auto; display:none;" onchange="toggleSwitchDepth()">
                <option value="random">🎲 Aléatoire</option>
                <option value="minimax">🧠 Minimax</option>
                <option value="bdd">🗄️ Base de données</option>
            </select>

            <select id="switchDepth" class="cyber-select" style="width:auto; display:none;">
                <option value="3">Profondeur 3</option>
                <option value="4" selected>Profondeur 4</option>
                <option value="5">Profondeur 5</option>
                <option value="6">Profondeur 6</option>
                <option value="7">Profondeur 7</option>
                <option value="8">Profondeur 8</option>
            </select>

            <select id="switchHumanColor" class="cyber-select" style="width:auto;">
                <option value="rouge">🔴 Je suis Rouge</option>
                <option value="jaune">🟡 Je suis Jaune</option>
            </select>

            <button onclick="switchControl()" class="btn btn-primary">✓ Appliquer</button>
        </div>

    </div>

    <!-- ═══ PLATEAU ═══ -->
    <div class="game-area">
        <div class="board-wrapper">
            <div id="board"></div>
            <div id="scoresRow"></div>
        </div>
    </div>

</div>

<script>
    const ROWS            = {{ rows }};
    const COLS            = {{ cols }};
    const INITIAL_GRID    = {{ grid | tojson }};
    const RESUMED         = {{ resumed | tojson }};
    const RESUMED_MODE    = {{ mode | tojson }};
    const HUMAN_COLOR     = {{ human_color }};
    const RESUMED_AI_TYPE = {{ ai_type | tojson }};
    const RESUMED_DEPTH   = {{ depth }};
</script>

<script>
// ══════════════════════════════════════════
// SYNC UI — met à jour les selects selon l'état réel du jeu
// ══════════════════════════════════════════
function syncUIState(mode, ai_type, humanColor, depth) {
    if (mode) {
        const modeSelect = document.getElementById('mode');
        if (modeSelect) modeSelect.value = mode;
    }
    if (ai_type) {
        const aiSelect = document.getElementById('ai_type');
        if (aiSelect) {
            aiSelect.value = ai_type;
            document.getElementById('depth-group').style.display =
                ai_type === 'bdd' ? 'none' : 'flex';
        }
    }
    if (humanColor !== null && humanColor !== undefined) {
        const startingSelect = document.getElementById('starting');
        if (startingSelect) startingSelect.value = String(humanColor);
    }
    if (depth !== null && depth !== undefined) {
        const depthInput = document.getElementById('depth');
        if (depthInput) depthInput.value = depth;
    }
}

// ══════════════════════════════════════════
// SWITCH CONTROLS — affichage dynamique IA / profondeur
// ══════════════════════════════════════════
function toggleSwitchAiOptions() {
    const mode     = document.getElementById('switchMode').value;
    const aiType   = document.getElementById('switchAiType');
    const depthSel = document.getElementById('switchDepth');
    const isAI     = mode === 'human_vs_ai' || mode === 'ai_vs_ai';
    aiType.style.display   = isAI ? 'inline-block' : 'none';
    depthSel.style.display = (isAI && aiType.value !== 'bdd') ? 'inline-block' : 'none';
}

function toggleSwitchDepth() {
    const aiType   = document.getElementById('switchAiType').value;
    const depthSel = document.getElementById('switchDepth');
    depthSel.style.display = aiType === 'bdd' ? 'none' : 'inline-block';
}

// Masquer profondeur principale si IA BDD
document.getElementById('ai_type').addEventListener('change', function() {
    document.getElementById('depth-group').style.display =
        this.value === 'bdd' ? 'none' : 'flex';
});

// Toggle affichage panel switch
function toggleSwitchControls() {
    const sc = document.getElementById('switchControls');
    sc.style.display = sc.style.display === 'flex' ? 'none' : 'flex';
}

// ── Barre de progression IA ─────────────────────────
let progressInterval = null;

function startAIProgress() {
    const bar  = document.getElementById('aiProgressBar');
    const prog = document.getElementById('aiProgress');
    prog.classList.add('active');
    bar.style.width = '0%';
    let w = 0;
    progressInterval = setInterval(() => {
        w = Math.min(w + 1.5, 88);
        bar.style.width = w + '%';
    }, 80);
}

function stopAIProgress() {
    const bar  = document.getElementById('aiProgressBar');
    const prog = document.getElementById('aiProgress');
    if (progressInterval) clearInterval(progressInterval);
    bar.style.width = '100%';
    setTimeout(() => {
        prog.classList.remove('active');
        bar.style.width = '0%';
    }, 350);
}

// Couleur du dot de statut
function setStatusColor(color) {
    const dot = document.getElementById('statusDot');
    if (color === 'thinking') {
        dot.style.background = '#f59e0b';
        dot.style.boxShadow = '0 0 0 3px rgba(245,158,11,0.2)';
    } else if (color === 'win') {
        dot.style.background = '#10b981';
        dot.style.boxShadow = '0 0 0 3px rgba(16,185,129,0.2)';
    } else {
        dot.style.background = '#7c3aed';
        dot.style.boxShadow = '0 0 0 3px rgba(124,58,237,0.2)';
    }
}
</script>

<script src="/static/script.js"></script>

<script>
// ══════════════════════════════════════════
// PATCH startGame — sync UI après démarrage
// ══════════════════════════════════════════
window.startGame = function() {
    const mode     = document.getElementById("mode").value;
    const ai_type  = document.getElementById("ai_type").value;
    const depth    = document.getElementById("depth").value;
    const starting = document.getElementById("starting").value;

    if (mode === "") { alert("Choisis un mode !"); return; }

    currentMode = mode;
    humanColor  = parseInt(starting);
    stopAIVsAI();
    exitPaintMode();

    fetch("/start", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({mode, ai_type, depth, starting})
    })
    .then(res => res.json())
    .then(data => {
        gameStarted = true;
        lastScores  = [];
        drawBoard(data.grid);

        syncUIState(mode, ai_type, parseInt(starting), parseInt(depth));

        const whoNow = humanColor === 1 ? "Rouge 🔴" : "Jaune 🟡";
        setInfo(`✅ Partie démarrée — À toi ${whoNow} !`, humanColor === 1 ? "var(--red)" : "var(--yellow)");
        if (currentMode === "ai_vs_ai") launchAIVsAI();
        if (currentMode === "human_vs_ai" && humanColor !== parseInt(starting)) {
            isAITurn = true;
            setTimeout(() => triggerAIMove(), 300);
        }
    });
};

// ══════════════════════════════════════════
// PATCH startFromPaint — sync UI après peinture
// ══════════════════════════════════════════
window.startFromPaint = function() {
    const mode        = document.getElementById("paintMode").value;
    const ai_type     = document.getElementById("paintAiType").value;
    const depth       = document.getElementById("depth").value;
    const human_color = document.getElementById("paintHumanColor").value;

    fetch("/start_from_paint", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({mode, ai_type, depth: parseInt(depth), human_color})
    })
    .then(res => res.json())
    .then(data => {
        exitPaintMode();
        gameStarted = true;
        currentMode = mode;
        humanColor  = human_color === "rouge" ? 1 : 2;
        lastScores  = [];
        drawBoard(data.grid);

        syncUIState(mode, ai_type, humanColor, parseInt(depth));

        setInfo(`PARTIE DEPUIS PAINTING — TOUR : ${data.next_player}`, "var(--neon-green)");
        if (currentMode === "ai_vs_ai") launchAIVsAI();
        if (data.ai_pending) {
            isAITurn = true;
            setTimeout(() => triggerAIMove(), 300);
        }
    });
};

// ══════════════════════════════════════════
// PATCH switchControl — avec IA + profondeur
// ══════════════════════════════════════════
window.switchControl = function() {
    const newMode       = document.getElementById("switchMode").value;
    const newAiType     = document.getElementById("switchAiType").value;
    const newDepth      = parseInt(document.getElementById("switchDepth").value) || 4;
    const newHumanColor = document.getElementById("switchHumanColor").value;

    fetch("/switch_control", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({mode: newMode, ai_type: newAiType, depth: newDepth, human_color: newHumanColor})
    })
    .then(res => res.json())
    .then(data => {
        currentMode = newMode;
        humanColor  = newHumanColor === "rouge" ? 1 : 2;
        stopAIVsAI();

        syncUIState(newMode, newAiType, humanColor, newDepth);

        const colorLabel = newHumanColor === "rouge" ? "ROUGE 🔴" : "JAUNE 🟡";
        setInfo(`MODE → ${newMode} | IA : ${newAiType} | HUMAIN = ${colorLabel}`, "var(--neon-yellow)");

        if (currentMode === "ai_vs_ai") launchAIVsAI();
        if (data.ai_pending) {
            isAITurn = true;
            setTimeout(() => triggerAIMove(), 300);
        }
    });
};

// ══════════════════════════════════════════
// PATCH triggerAIMove avec barre de progression
// ══════════════════════════════════════════
window.triggerAIMove = function() {
    startAIProgress();
    setStatusColor('thinking');
    fetch("/ai_move", { method: "POST" })
    .then(res => res.json())
    .then(data => {
        stopAIProgress();
        isAITurn = false;
        if (data.error) return;
        drawBoard(data.grid, data.scores || [], data.winning_cells || []);
        if (data.winner) {
            setStatusColor('win');
            const who = data.winner === 1 ? "Rouge 🔴" : "Jaune 🟡";
            const col = data.winner === 1 ? "var(--red)" : "var(--yellow)";
            setInfo(`🏆 Victoire — Joueur ${who} !`, col);
            setTimeout(() => alert(`Victoire joueur ${who} !`), 100);
        } else if (data.draw) {
            setInfo("🤝 Match nul — Égalité parfaite !", "var(--cyan)");
            setTimeout(() => alert("Match nul !"), 100);
        } else {
            setStatusColor('normal');
            const whoNow = humanColor === 1 ? "Rouge 🔴" : "Jaune 🟡";
            setInfo(`👆 À toi de jouer — ${whoNow}`, humanColor === 1 ? "var(--red)" : "var(--yellow)");
        }
    });
};

// ══════════════════════════════════════════
// PATCH aiMove pour IA vs IA
// ══════════════════════════════════════════
window.aiMove = function() {
    if (!gameStarted) return;
    isAITurn = true;
    setInfo("🧠 IA en train de réfléchir...", "var(--violet)");
    setStatusColor('thinking');
    startAIProgress();
    fetch("/ai_move", { method: "POST" })
    .then(res => res.json())
    .then(data => {
        stopAIProgress();
        isAITurn = false;
        if (data.error) { stopAIVsAI(); return; }
        drawBoard(data.grid, data.scores || [], data.winning_cells || []);
        if (data.winner) {
            stopAIVsAI();
            setStatusColor('win');
            const who = data.winner === 1 ? "Rouge 🔴" : "Jaune 🟡";
            const col = data.winner === 1 ? "var(--red)" : "var(--yellow)";
            setInfo(`🏆 Victoire — ${who} !`, col);
            setTimeout(() => alert(`Victoire ${who} !`), 100);
        } else if (data.draw) {
            stopAIVsAI();
            setInfo("🤝 Match nul !", "var(--cyan)");
        } else {
            setStatusColor('normal');
            setInfo("⚡ Combat IA en cours...", "var(--violet)");
        }
    });
};

// ══════════════════════════════════════════
// SYNC AU CHARGEMENT si partie reprise
// ══════════════════════════════════════════
if (RESUMED && RESUMED_MODE) {
    syncUIState(RESUMED_MODE, RESUMED_AI_TYPE, HUMAN_COLOR, RESUMED_DEPTH);
    gameStarted = true;
    currentMode = RESUMED_MODE;
    humanColor  = HUMAN_COLOR;
    const whoNow = humanColor === 1 ? "Rouge 🔴" : "Jaune 🟡";
    setInfo(`↩ Partie reprise — À toi ${whoNow} !`, humanColor === 1 ? "var(--red)" : "var(--yellow)");
    if (currentMode === "ai_vs_ai") launchAIVsAI();
    if (currentMode === "human_vs_ai") {
        fetch("/get_grid").then(r => r.json()).then(d => {
            if (d.ai_turn) { isAITurn = true; setTimeout(() => triggerAIMove(), 500); }
        });
    }
}
</script>

</body>
</html>
